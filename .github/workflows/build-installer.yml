name: Build Installers

on:
  push:
    branches: [main]
    paths:
      - '**.iss'
      - '**.ps1'
      - '**.bat'
      - '**.command'
      - '**.sh'
      - '*.tgz'
      - '.github/workflows/build-installer.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Compile installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" BeCEO-Setup.iss
        shell: pwsh

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeCEO-Setup-Windows
          path: output/*.exe
          retention-days: 30

      - name: Get version from .iss
        id: version
        shell: pwsh
        run: |
          $version = (Select-String -Path BeCEO-Setup.iss -Pattern '#define AppVersion "(.+)"').Matches.Groups[1].Value
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Store version
        run: echo "${{ steps.version.outputs.version }}" > version.txt

      - name: Upload version artifact
        uses: actions/upload-artifact@v4
        with:
          name: version
          path: version.txt

  build-macos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare macOS installer package
        run: |
          mkdir -p output
          cp mac/install.sh output/BeCEO-macOS-install.sh
          chmod +x output/BeCEO-macOS-install.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeCEO-Setup-macOS
          path: output/BeCEO-macOS-install.sh
          retention-days: 30

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: version
        run: echo "version=$(cat artifacts/version/version.txt)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: BeCEO v${{ steps.version.outputs.version }}
          body: |
            ## BeCEO Installer

            ### Windows
            Download `BeCEO-Setup-*.exe` and double-click to install.

            ### macOS
            1. Download `BeCEO-macOS-install.sh` and place it in the same folder as `beceo-V1Beta.tgz`
            2. Open Terminal and run:
            ```bash
            bash ~/Downloads/BeCEO-macOS-install.sh
            ```

            > **Windows:** May show "Unknown Publisher" warning — click **More info → Run anyway**.

            **The installer will automatically:**
            - Install Homebrew / Node.js v22 (if not already installed)
            - Install BeCEO
            - Launch the initial setup wizard
          files: |
            artifacts/BeCEO-Setup-Windows/*.exe
            artifacts/BeCEO-Setup-macOS/*.dmg
          make_latest: true
