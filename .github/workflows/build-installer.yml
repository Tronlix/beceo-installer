name: Build Windows Installer

on:
  push:
    branches: [main]
    paths:
      - '**.iss'
      - '**.ps1'
      - '**.bat'
      - '*.tgz'
      - '.github/workflows/build-installer.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Compile installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" BeCEO-Setup.iss
        shell: pwsh

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeCEO-Setup
          path: output/*.exe
          retention-days: 30

      - name: Get version from .iss
        id: version
        shell: pwsh
        run: |
          $version = (Select-String -Path BeCEO-Setup.iss -Pattern '#define AppVersion "(.+)"').Matches.Groups[1].Value
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: BeCEO v${{ steps.version.outputs.version }}
          body: |
            ## BeCEO Windows Installer

            Download `BeCEO-Setup-*.exe` and double-click to install.

            **The installer will automatically:**
            - Install Node.js v22 (if not already installed)
            - Install BeCEO
            - Launch the initial setup wizard

            > **Note:** Windows may show an "Unknown Publisher" warning.
            > Click **More info → Run anyway** to proceed.
          files: output/*.exe
          make_latest: true
